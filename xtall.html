<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Xtall Database</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#08080e;color:#e8e8f0;font-family:'Inter',sans-serif;padding:0 0 60px;background-image:radial-gradient(ellipse at 30% 10%,rgba(212,168,67,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(74,143,224,.03) 0%,transparent 50%)}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:#12121e}
        ::-webkit-scrollbar-thumb{background:#2a2a44;border-radius:8px}
        ::-webkit-scrollbar-thumb:hover{background:#d4a843}
        .container{max-width:1400px;margin:0 auto;padding:0 24px}
        
        /* HEADER */
        .header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:16px 0 8px;border-bottom:1px solid #1e1e32;margin-bottom:12px;position:relative}
        .header-left{display:flex;align-items:center;gap:14px}
        .logo{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#d4a843,#f0d080,#b8923a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.04em}
        
        /* BACK BUTTON */
        .btn-back{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:40px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#aaaacc;text-decoration:none;font-family:'Inter',sans-serif}
        .btn-back:hover{background:rgba(59,130,246,0.15);border-color:#3b82f6;color:#60a5fa;transform:translateY(-1px)}
        .btn-back .icon{font-size:1rem}
        
        /* STATS ROW */
        .stats-row{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;padding:6px 0 2px}
        .stats-row .stat-item{display:flex;align-items:center;gap:4px;background:#10101c;padding:3px 12px;border-radius:20px;border:1px solid #1a1a30;font-size:.75rem;color:#aaaacc;white-space:nowrap}
        .stats-row .stat-item .num{font-weight:600;font-size:.85rem}
        .stats-row .stat-item .icon{font-size:.85rem;opacity:.7}
        .stats-row .stat-item.xtal .num{color:#d4a843}
        .stats-row .stat-item.relasi .num{color:#66bbff}
        .stats-row .stat-item.boss .num{color:#55ff88}
        .stats-row .stat-item.map .num{color:#ff9966}
        
        .time-center{text-align:center;padding:2px 0 10px;font-size:.7rem;color:#555577;border-bottom:1px solid #1a1a2e;margin-bottom:14px}
        .time-center span{color:#666688}

        /* SEARCH */
        .search-section{position:relative;margin-bottom:18px}
        .search-wrap{display:flex;align-items:center;background:#12121e;border-radius:60px;border:1px solid #22223a;padding:0 6px 0 20px;transition:border-color .3s}
        .search-wrap:focus-within{border-color:#d4a843;box-shadow:0 0 30px rgba(212,168,67,.06)}
        .search-wrap input{flex:1;background:transparent;border:none;padding:12px 10px 12px 0;font-size:.95rem;color:#f0f0f8;outline:none}
        .search-wrap input::placeholder{color:#555577}
        .search-wrap .clear-btn{background:none;border:none;color:#555577;padding:6px 12px;cursor:pointer;display:none;font-size:1rem}
        .search-wrap .clear-btn.visible{display:block}
        .autocomplete-box{position:absolute;top:calc(100%+6px);left:0;right:0;background:#12121e;border:1px solid #22223a;border-radius:16px;max-height:380px;overflow-y:auto;display:none;z-index:1000;padding:6px 0;box-shadow:0 20px 60px rgba(0,0,0,.8)}
        .autocomplete-box.open{display:block}
        .autocomplete-box .suggestion{padding:10px 20px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid #1a1a2e;transition:background .15s}
        .autocomplete-box .suggestion:hover{background:#1c1c32}
        .autocomplete-box .suggestion .name{font-weight:500}
        .autocomplete-box .suggestion .meta{font-size:.7rem;color:#8888aa}

        /* GRID */
        .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:6px}
        .item-card{background:#10101c;border:1px solid #1a1a30;border-radius:16px;padding:16px 18px;cursor:pointer;transition:all .25s}
        .item-card:hover{border-color:#d4a84355;transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5);background:#141424}
        .item-card .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px}
        .item-card .item-name{font-weight:600;font-size:1.05rem;color:#f0f0f8;word-break:break-word}
        .item-card .item-id{font-size:.65rem;color:#555577;background:#1a1a2e;padding:2px 10px;border-radius:40px;white-space:nowrap}
        .item-card .effect{margin-top:6px;font-size:.82rem}
        .item-card .stat{display:flex;justify-content:space-between;padding:2px 0;font-size:13px;line-height:1.4}
        .item-card .stat.positive{color:#55ff88}
        .item-card .stat.negative{color:#ff6666}
        .item-card .card-footer{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:.7rem;color:#7777aa;border-top:1px solid #18182a;padding-top:8px;margin-top:6px}
        .item-card .card-footer .rel-tag{background:#1a1a2e;padding:2px 12px;border-radius:40px;color:#b0b0d0;cursor:pointer;transition:all .2s}
        .item-card .card-footer .rel-tag:hover{background:#2a2a44;color:#f0f0f8}
        .item-card .card-footer .rel-tag.up{border-left:2px solid #d4a843}
        .item-card .card-footer .rel-tag.down{border-left:2px solid #4a8fe0}
        .item-card .location{font-size:.7rem;color:#666688;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
        .item-card .location span{display:inline-flex;align-items:center;gap:4px}
        .item-card .location .monster-name{color:#d4a843}
        .item-card .location .map-name{color:#66bbff}

        /* DETAIL */
        .detail-panel{background:#0e0e1a;border:1px solid #1e1e34;border-radius:20px;padding:24px 28px;margin-top:24px;display:none;position:relative;animation:fadeUp .35s ease}
        .detail-panel.open{display:block}
        .detail-panel .close-detail{position:absolute;top:12px;right:16px;background:none;border:none;color:#666688;font-size:1.5rem;cursor:pointer;transition:color .2s;z-index:2}
        .detail-panel .close-detail:hover{color:#f0f0f8}
        .detail-panel .detail-body{display:block}
        .detail-panel .detail-body .rel-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#666688;display:block;margin-bottom:6px}
        .detail-panel .detail-body .rel-chain{display:flex;flex-direction:column;gap:4px;padding:4px 0}
        .detail-panel .detail-body .chain-item{background:#141424;padding:5px 14px;border-radius:40px;font-size:.85rem;border:1px solid #22223a;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;width:fit-content}
        .detail-panel .detail-body .chain-item:hover{border-color:#d4a843;background:#1c1c32}
        .detail-panel .detail-body .chain-item .cid{font-size:.6rem;color:#555577}
        .detail-panel .detail-body .chain-arrow{color:#666688;font-size:.7rem;padding:2px 0 2px 8px}
        .detail-panel .detail-body .chain-current{background:#1a1a2e;border-color:#d4a84355;color:#d4a843;cursor:default}
        .detail-panel .detail-body .chain-current:hover{background:#1a1a2e;border-color:#d4a84355}

        /* LOADING */
        .loading-overlay{display:none;position:fixed;inset:0;background:rgba(8,8,14,.85);backdrop-filter:blur(6px);z-index:9999;justify-content:center;align-items:center;flex-direction:column;gap:24px}
        .loading-overlay.active{display:flex}
        .loading-overlay .spinner{width:56px;height:56px;border:3px solid #1a1a30;border-top-color:#d4a843;border-radius:50%;animation:spin .9s linear infinite}
        .loading-overlay .msg{font-size:1rem;color:#b0b0cc;text-align:center;max-width:400px;line-height:1.6}
        .loading-overlay .progress{width:300px;max-width:80%;height:4px;background:#1a1a30;border-radius:8px;overflow:hidden}
        .loading-overlay .progress .bar{height:100%;width:0%;background:linear-gradient(90deg,#d4a843,#f0d080);border-radius:8px;transition:width .3s}
        .loading-overlay .progress-text{font-size:.75rem;color:#666688}

        /* TOAST */
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#141424;border:1px solid #2a2a44;border-radius:16px;padding:14px 28px;color:#e8e8f0;font-size:.9rem;box-shadow:0 20px 60px rgba(0,0,0,.7);opacity:0;transition:all .4s;pointer-events:none;z-index:9998;backdrop-filter:blur(8px)}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.error{border-color:#883333;background:#1e0e0e}
        .toast.success{border-color:#3a8844;background:#0e1e10}

        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        
        #emptyState{text-align:center;padding:60px 20px;color:#666688;display:none}
        #emptyState .icon{font-size:3rem;margin-bottom:16px}
        #emptyState p{font-size:1.1rem}
        #emptyState .muted{font-size:.875rem;color:#8888aa}
        .gold{color:#d4a843}
        .muted{color:#8888aa;font-size:.875rem}

        @media(max-width:820px){.header{flex-direction:column;align-items:stretch;gap:8px}.header .logo{text-align:center}.header-left{justify-content:space-between;width:100%}.stats-row{justify-content:center;gap:4px 8px}.stats-row .stat-item{font-size:.7rem;padding:2px 10px}.stats-row .stat-item .num{font-size:.75rem}.detail-panel{padding:18px}.items-grid{grid-template-columns:1fr}.search-wrap input{padding:10px 8px 10px 0;font-size:.9rem}.container{padding:0 14px}}
    </style>
</head>
<body>

    <!-- LOADING -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="msg" id="loadingMsg">Memuat data …</div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- MAIN -->
    <div class="container">
        <header class="header">
            <div class="header-left">
                <span class="logo">✦ Xtall Database</span>
                <a href="index.html" class="btn-back">
                    <span class="icon">←</span> Kembali
                </a>
            </div>
            <div class="stats-row" id="statsRow">
                <span class="stat-item xtal"><span class="icon">📦</span><span class="num" id="statTotal">0</span> Xtal</span>
                <span class="stat-item relasi"><span class="icon">🔗</span><span class="num" id="statUpgrades">0</span> Relasi</span>
                <span class="stat-item boss"><span class="icon">👹</span><span class="num" id="statMonsters">0</span> Boss</span>
                <span class="stat-item map"><span class="icon">🗺️</span><span class="num" id="statMaps">0</span> Map</span>
            </div>
        </header>

        <div class="time-center">
            <span id="lastUpdatedLabel">⏱ Belum diperbarui</span>
        </div>

        <div class="search-section">
            <div class="search-wrap">
                <span style="color:#6666aa;margin-right:8px;">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari nama Xtal …" autocomplete="off" spellcheck="false" />
                <button class="clear-btn" id="clearBtn">✕</button>
            </div>
            <div class="autocomplete-box" id="autocompleteBox"></div>
        </div>

        <div id="itemsContainer">
            <div class="items-grid" id="itemsGrid"></div>
            <div id="emptyState">
                <div class="icon">🔎</div>
                <p>Ketik untuk mencari xtal</p>
                <p class="muted">Mulai mengetik nama xtal di kolom pencarian</p>
            </div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <button class="close-detail" id="closeDetail">✕</button>
            <div class="detail-body">
                <span class="rel-label">Rantai Relasi</span>
                <div class="rel-chain" id="fullChain"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // XTALL DATABASE v7.3 – Dengan tombol kembali ke index.html
        // ============================================================

        const API_BASE = 'https://coryn.club';
        const STORAGE_KEY = 'xtal_db_v5';
        const LIMIT = 100;
        const CONCURRENCY = 12;
        const DEFAULT_IMPORT_URL = 'https://cdn.jsdelivr.net/gh/EwakaToram/Toram@main/xtall.json';

        let db = null;
        let isRefreshing = false;
        let autocompleteIndex = [];
        let currentDetailId = null;

        const $ = s => document.querySelector(s);
        const searchInput = $('#searchInput');
        const autocompleteBox = $('#autocompleteBox');
        const clearBtn = $('#clearBtn');
        const itemsGrid = $('#itemsGrid');
        const emptyState = $('#emptyState');
        const detailPanel = $('#detailPanel');
        const loadingOverlay = $('#loadingOverlay');
        const loadingMsg = $('#loadingMsg');
        const progressBar = $('#progressBar');
        const progressText = $('#progressText');
        const toastEl = $('#toast');

        const statTotal = $('#statTotal');
        const statUpgrades = $('#statUpgrades');
        const statMonsters = $('#statMonsters');
        const statMaps = $('#statMaps');
        const lastUpdatedLabel = $('#lastUpdatedLabel');

        const fullChain = $('#fullChain');
        const closeDetailBtn = $('#closeDetail');

        let toastTimer = null;

        function showToast(msg, type = 'info', duration = 3200) {
            if (toastTimer) clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            else if (type === 'success') toastEl.classList.add('success');
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => { toastEl.classList.remove('show');
                toastTimer = null; }, duration);
        }

        function showLoading(msg, progress = 0) {
            loadingOverlay.classList.add('active');
            loadingMsg.textContent = msg;
            progressBar.style.width = Math.min(100, progress) + '%';
            progressText.textContent = Math.round(Math.min(100, progress)) + '%';
        }

        function updateLoading(msg, progress) {
            loadingMsg.textContent = msg;
            progressBar.style.width = Math.min(100, progress) + '%';
            progressText.textContent = Math.round(Math.min(100, progress)) + '%';
        }

        function hideLoading() { loadingOverlay.classList.remove('active'); }

        // ---- STORAGE ----
        function loadDb() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (!data || typeof data !== 'object') return null;
                if (!Array.isArray(data.items)) data.items = [];
                if (!data.upgradeMap) data.upgradeMap = {};
                if (!data.downgradeMap) data.downgradeMap = {};
                if (!data.monsterCache) data.monsterCache = {};
                if (!data.mapCache) data.mapCache = {};
                return data;
            } catch (e) { return null; }
        }

        function saveDb(data) {
            try {
                if (!data || typeof data !== 'object') return false;
                if (!Array.isArray(data.items)) data.items = [];
                const toSave = {
                    version: data.version || '7.3',
                    lastUpdated: data.lastUpdated || new Date().toISOString(),
                    items: data.items || [],
                    upgradeMap: data.upgradeMap || {},
                    downgradeMap: data.downgradeMap || {},
                    monsterCache: data.monsterCache || {},
                    mapCache: data.mapCache || {},
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
                return !!localStorage.getItem(STORAGE_KEY);
            } catch (e) { return false; }
        }

        // ---- RELASI ----
        function getAllEffectNames(item) {
            const effects = [];
            function traverse(obj) {
                if (!obj || typeof obj !== 'object') return;
                for (const [key, val] of Object.entries(obj)) {
                    if (key === 'effect_name' && typeof val === 'string') effects.push(val);
                    else if (Array.isArray(val)) { for (const elem of val) traverse(elem); } else if (typeof val ===
                        'object') traverse(val);
                }
            }
            traverse(item);
            return effects;
        }

        function findUpgradeTarget(item) {
            if (item.stats && Array.isArray(item.stats)) {
                for (const stat of item.stats) {
                    const en = stat.effect_name;
                    if (en && typeof en === 'string' && en.trim().toLowerCase() === 'upgrade for') {
                        if (stat.amount && typeof stat.amount === 'number' && stat.amount > 0) return stat.amount;
                    }
                }
            }
            if (item.amount && typeof item.amount === 'number' && item.amount > 0) {
                const effects = getAllEffectNames(item);
                for (const eff of effects) {
                    if (eff.trim().toLowerCase() === 'upgrade for') return item.amount;
                }
            }
            return null;
        }

        function buildRelations(items) {
            const upgradeMap = {};
            const downgradeMap = {};
            const itemMap = {};
            for (const it of items) itemMap[it.id] = it;
            for (const it of items) {
                const targetId = findUpgradeTarget(it);
                if (targetId !== null && targetId !== it.id && itemMap[targetId]) {
                    if (!upgradeMap[it.id]) upgradeMap[it.id] = [];
                    if (!upgradeMap[it.id].includes(targetId)) {
                        upgradeMap[it.id].push(targetId);
                        downgradeMap[targetId] = it.id;
                    }
                }
            }
            return { upgradeMap, downgradeMap };
        }

        function isXtal(item) {
            const label = item.type_label;
            if (Array.isArray(label)) return label.some(l => l.toLowerCase().includes('crysta') || l.toLowerCase()
                .includes('crystal'));
            if (typeof label === 'string') {
                const lower = label.toLowerCase();
                return lower.includes('crysta') || lower.includes('crystal');
            }
            return [210, 220, 230].includes(item.type_id);
        }

        // ---- EKSTRAK MONSTER/MAP ----
        function extractMonsterName(item) {
            for (const [key, val] of Object.entries(item)) {
                const lk = key.toLowerCase();
                if ((lk.includes('drop') || lk.includes('monster')) && typeof val === 'string' && val.length > 2) {
                    const clean = val.replace(/^(dropped by|from|monster:)\s*/i, '').trim();
                    if (clean.length > 2 && !clean.includes('Update') && !clean.includes('version')) return clean;
                }
            }
            if (item.meta && item.meta.note && typeof item.meta.note === 'string') {
                const note = item.meta.note;
                const match = note.match(/(?:dropped by|from|monster:?)\s*([A-Za-z\s\-']+)/i);
                if (match) return match[1].trim();
                const words = note.match(/\b([A-Z][a-z]+(?:\s[A-Z][a-z]+)*)\b/g);
                if (words && words.length > 0 && !words[0].includes('Update')) return words[0];
            }
            if (item.description && typeof item.description === 'string') {
                const desc = item.description;
                const match = desc.match(/(?:dropped by|from|monster:?)\s*([A-Za-z\s\-']+)/i);
                if (match) return match[1].trim();
            }
            const name = item.name || '';
            let cleanName = name.replace(/\s*Crysta.*$/i, '').replace(/\s*Crystal.*$/i, '').trim();
            if (cleanName.length > 2) return cleanName;
            return null;
        }

        function extractMonsterMapIds(item) {
            let monsterId = null,
                mapId = null;
            for (const [key, val] of Object.entries(item)) {
                const lk = key.toLowerCase();
                if ((lk.includes('monster') || lk.includes('drop')) && typeof val === 'number') monsterId = val;
                if ((lk.includes('map') || lk.includes('location')) && typeof val === 'number') mapId = val;
                if (val && typeof val === 'object' && val.id) {
                    if (lk.includes('monster') || lk.includes('drop')) monsterId = val.id;
                    if (lk.includes('map') || lk.includes('location')) mapId = val.id;
                }
            }
            if (monsterId === null && item.meta && item.meta.monster && typeof item.meta.monster === 'number') monsterId =
                item.meta.monster;
            if (mapId === null && item.meta && item.meta.map && typeof item.meta.map === 'number') mapId = item.meta.map;
            return { monsterId, mapId };
        }

        async function fetchMonsterByName(monsterName) {
            if (!monsterName) return null;
            try {
                const url = new URL('/api/v1/monsters.php', API_BASE);
                url.searchParams.set('name', monsterName);
                const resp = await fetch(url);
                if (!resp.ok) return null;
                const json = await resp.json();
                if (json.success && json.data && json.data.length > 0) return json.data;
                return null;
            } catch (e) { return null; }
        }

        function getBestMonster(monsters) {
            if (!monsters || monsters.length === 0) return null;
            let best = monsters.find(m => m.type_code === "B" && m.mode === "Normal");
            if (!best) best = monsters.find(m => m.type_code === "B");
            if (!best) best = monsters.find(m => m.mode === "Normal");
            if (!best) best = monsters[0];
            return best;
        }

        async function enrichItem(item, retries = 2) {
            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const url = new URL('/api/v1/items.php', API_BASE);
                    url.searchParams.set('id', item.id);
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const json = await resp.json();
                    if (json.success && json.data) {
                        const detail = json.data;
                        const merged = { ...item, ...detail };
                        merged._monsterName = extractMonsterName(merged);
                        const { monsterId, mapId } = extractMonsterMapIds(merged);
                        merged._monsterId = monsterId;
                        merged._mapId = mapId;
                        return merged;
                    }
                } catch (e) {
                    if (attempt === retries) console.warn(`Gagal enrich ${item.id}:`, e);
                    else await sleep(200);
                }
            }
            const { monsterId, mapId } = extractMonsterMapIds(item);
            item._monsterName = extractMonsterName(item);
            item._monsterId = monsterId;
            item._mapId = mapId;
            return item;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function enrichItems(items, onProgress) {
            const enriched = [];
            const total = items.length;
            let done = 0;
            const queue = [...items];
            const workers = [];
            for (let i = 0; i < Math.min(CONCURRENCY, total); i++) {
                workers.push((async () => {
                    while (queue.length > 0) {
                        const item = queue.shift();
                        const enrichedItem = await enrichItem(item);
                        enriched.push(enrichedItem);
                        done++;
                        if (onProgress) onProgress(`Memperkaya data ${done}/${total}`, (done / total) * 100);
                    }
                })());
            }
            await Promise.all(workers);
            return enriched;
        }

        async function fetchAllItems(onProgress) {
            let allItems = [];
            let offset = 0;
            let total = null;
            while (true) {
                const url = new URL('/api/v1/items.php', API_BASE);
                url.searchParams.set('limit', LIMIT);
                url.searchParams.set('offset', offset);
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const json = await resp.json();
                if (!json.success) throw new Error(json.error || 'API error');
                const data = Array.isArray(json.data) ? json.data : (json.data ? [json.data] : []);
                total = json.meta?.total || 0;
                allItems = allItems.concat(data);
                offset += data.length;
                if (onProgress) onProgress(`Mengunduh item … ${allItems.length}/${total}`, (allItems.length / total) *
                100);
                if (data.length < LIMIT || allItems.length >= total) break;
            }
            return allItems;
        }

        async function fetchMonsterAndMap(items, onProgress) {
            const monsterNames = new Set();
            for (const it of items) {
                if (it._monsterName) monsterNames.add(it._monsterName);
                const nameClean = it.name.replace(/\s*Crysta.*$/i, '').replace(/\s*Crystal.*$/i, '').trim();
                if (nameClean.length > 2 && !nameClean.includes('Crysta') && !nameClean.includes('Crystal')) {
                    monsterNames.add(nameClean);
                }
            }
            const monsterCache = {};
            const mapCache = {};
            let fetched = 0;
            const total = monsterNames.size;
            for (const name of monsterNames) {
                try {
                    const data = await fetchMonsterByName(name);
                    if (data) {
                        monsterCache[name] = data;
                        const best = getBestMonster(data);
                        if (best && best.map_id && best.map_name) {
                            mapCache[best.map_id] = { id: best.map_id, name: best.map_name };
                        }
                    }
                } catch (_) {}
                fetched++;
                if (onProgress) onProgress(`Boss/Map ${fetched}/${total}`, (fetched / total) * 100);
            }
            return { monsterCache, mapCache };
        }

        // ---- RENDER ----
        function renderStats(item, itemMap) {
            if (!item.stats || !item.stats.length) return '<div class="stat">—</div>';
            let html = '';
            for (const stat of item.stats) {
                const en = stat.effect_name;
                const amt = stat.amount;
                if (en && en.trim().toLowerCase() === 'upgrade for') continue;
                let value = amt;
                let displayValue = value;
                if (value > 0) displayValue = '+' + value;
                if (en && en.endsWith('%')) displayValue += '%';
                const cls = amt >= 0 ? 'positive' : 'negative';
                const label = en ? en.replace(' %', '') : '—';
                html += `<div class="stat ${cls}">${escapeHtml(label)} <b>${displayValue}</b></div>`;
            }
            return html || '<div class="stat">—</div>';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function getMonsterAndMap(item, monsterCache, mapCache) {
            let monsterName = '—',
                mapName = '—';
            const name = item._monsterName;
            if (name && monsterCache[name]) {
                const data = monsterCache[name];
                const best = getBestMonster(data);
                if (best) { monsterName = best.name;
                    mapName = best.map_name || '—'; return { monsterName, mapName }; }
            }
            const mid = item._monsterId;
            if (mid && monsterCache[mid]) {
                const data = Array.isArray(monsterCache[mid]) ? monsterCache[mid] : [monsterCache[mid]];
                const best = getBestMonster(data);
                if (best) { monsterName = best.name;
                    mapName = best.map_name || '—'; return { monsterName, mapName }; }
            }
            const mapId = item._mapId;
            if (mapId && mapCache[mapId]) mapName = mapCache[mapId].name || '#' + mapId;
            return { monsterName, mapName };
        }

        function buildAutocomplete(items) {
            autocompleteIndex = items.map(it => ({ id: it.id, name: it.name, nameLower: it.name.toLowerCase() }));
        }

        function renderAutocomplete(query) {
            const q = query.toLowerCase().trim();
            if (!q) { autocompleteBox.classList.remove('open'); return; }
            const matches = autocompleteIndex.filter(it => it.nameLower.includes(q)).slice(0, 12);
            if (!matches.length) {
                autocompleteBox.innerHTML = `<div class="empty-msg">Tidak ditemukan</div>`;
                autocompleteBox.classList.add('open');
                return;
            }
            let html = '';
            for (const m of matches) {
                html += `
                    <div class="suggestion" data-id="${m.id}">
                        <span class="name">${highlight(m.name, q)}</span>
                        <span class="meta">#${m.id}</span>
                    </div>
                `;
            }
            autocompleteBox.innerHTML = html;
            autocompleteBox.classList.add('open');
            autocompleteBox.querySelectorAll('.suggestion').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    searchInput.value = autocompleteIndex.find(i => i.id === id)?.name || '';
                    autocompleteBox.classList.remove('open');
                    clearBtn.classList.add('visible');
                    renderAll();
                    showDetail(id);
                });
            });
        }

        function highlight(text, query) {
            const idx = text.toLowerCase().indexOf(query);
            if (idx === -1) return escapeHtml(text);
            return escapeHtml(text.slice(0, idx)) +
                `<strong style="color:#d4a843;">${escapeHtml(text.slice(idx, idx+query.length))}</strong>` +
                escapeHtml(text.slice(idx + query.length));
        }

        function getFullChain(itemId, upgradeMap, downgradeMap, items) {
            const downChain = [];
            let current = itemId;
            const visitedDown = new Set();
            while (current && !visitedDown.has(current)) {
                const item = items.find(i => i.id === current);
                if (!item) break;
                downChain.push(item);
                visitedDown.add(current);
                const source = downgradeMap[current];
                if (!source) break;
                current = source;
            }
            const upChain = [];
            current = itemId;
            const visitedUp = new Set();
            while (current && !visitedUp.has(current)) {
                const item = items.find(i => i.id === current);
                if (!item) break;
                if (current !== itemId) upChain.push(item);
                visitedUp.add(current);
                const targets = upgradeMap[current] || [];
                if (targets.length === 0) break;
                current = targets[0];
            }
            const reversedDown = [...downChain].reverse();
            const full = [];
            for (const it of reversedDown) { if (!full.some(f => f.id === it.id)) full.push(it); }
            for (const it of upChain) { if (!full.some(f => f.id === it.id)) full.push(it); }
            return full;
        }

        function renderChainVertical(chainItems, currentId) {
            if (!chainItems || chainItems.length === 0) return '<span class="muted">Tidak ada relasi</span>';
            let html = '';
            for (let i = 0; i < chainItems.length; i++) {
                const item = chainItems[i];
                const isCurrent = item.id === currentId;
                const cls = isCurrent ? 'chain-item chain-current' : 'chain-item';
                const label = isCurrent ? `${escapeHtml(item.name)} ⬅` : escapeHtml(item.name);
                html += `<span class="${cls}" data-id="${item.id}">${label} <span class="cid">#${item.id}</span></span>`;
                if (i < chainItems.length - 1) html += `<span class="chain-arrow">↓</span>`;
            }
            return html;
        }

        function showDetail(id) {
            if (!db) return;
            const item = db.items.find(i => i.id === id);
            if (!item) { showToast('Item tidak ditemukan', 'error'); return; }
            currentDetailId = id;
            detailPanel.classList.add('open');
            const chain = getFullChain(id, db.upgradeMap, db.downgradeMap, db.items);
            fullChain.innerHTML = renderChainVertical(chain, id);
            fullChain.querySelectorAll('.chain-item:not(.chain-current)').forEach(el => {
                el.addEventListener('click', (e) => {
                    const targetId = parseInt(el.dataset.id);
                    if (targetId && targetId !== id) {
                        searchInput.value = db.items.find(i => i.id === targetId)?.name || '';
                        clearBtn.classList.add('visible');
                        renderAll();
                        showDetail(targetId);
                    }
                });
            });
        }

        function renderAll() {
            if (!db) {
                db = loadDb();
                if (!db) { db = { items: [], upgradeMap: {}, downgradeMap: {}, monsterCache: {}, mapCache: {} };
                    renderEmpty(true);
                    updateStats(); return; }
            }
            const { items, upgradeMap, downgradeMap, monsterCache, mapCache } = db;
            const total = items.length;
            const relCount = Object.values(upgradeMap).reduce((a, b) => a + b.length, 0);
            statTotal.textContent = total;
            statUpgrades.textContent = relCount;
            statMonsters.textContent = Object.keys(monsterCache).length;
            statMaps.textContent = Object.keys(mapCache).length;
            if (db.lastUpdated) {
                const d = new Date(db.lastUpdated);
                lastUpdatedLabel.textContent = '🕒 ' + d.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            }
            const query = searchInput.value.trim();
            if (!items.length || !query) { renderEmpty(true); return; }
            const filtered = items.filter(it => it.name.toLowerCase().includes(query.toLowerCase()));
            if (!filtered.length) { renderEmpty(false); return; }
            emptyState.style.display = 'none';
            const itemMap = {};
            for (const it of items) itemMap[it.id] = it;
            renderGrid(filtered, upgradeMap, downgradeMap, monsterCache, mapCache, itemMap);
            buildAutocomplete(items);
        }

        function renderEmpty(showSearchHint = false) {
            itemsGrid.innerHTML = '';
            emptyState.style.display = 'block';
            if (showSearchHint) {
                emptyState.querySelector('.icon').textContent = '🔎';
                emptyState.querySelector('p').textContent = 'Ketik untuk mencari xtal';
                emptyState.querySelector('.muted').textContent = 'Mulai mengetik nama xtal di kolom pencarian';
            } else {
                emptyState.querySelector('.icon').textContent = '◈';
                emptyState.querySelector('p').textContent = 'Tidak ditemukan';
                emptyState.querySelector('.muted').textContent = 'Coba kata kunci lain';
            }
            detailPanel.classList.remove('open');
        }

        function renderGrid(items, upgradeMap, downgradeMap, monsterCache, mapCache, itemMap) {
            emptyState.style.display = 'none';
            let html = '';
            for (const it of items) {
                const isUp = upgradeMap[it.id] && upgradeMap[it.id].length;
                const isDown = downgradeMap[it.id] !== undefined;
                const statsHtml = renderStats(it, itemMap);
                const { monsterName, mapName } = getMonsterAndMap(it, monsterCache, mapCache);
                let upTag = '',
                    downTag = '';
                if (isUp) {
                    const targetId = upgradeMap[it.id][0];
                    const targetItem = itemMap[targetId];
                    upTag =
                        `<span class="rel-tag up" data-id="${targetId}">⬆ upgrade → ${escapeHtml(targetItem ? targetItem.name : '#'+targetId)}</span>`;
                }
                if (isDown) {
                    const srcId = downgradeMap[it.id];
                    const srcItem = itemMap[srcId];
                    downTag =
                        `<span class="rel-tag down" data-id="${srcId}">⬇ downgrade from ${escapeHtml(srcItem ? srcItem.name : '#'+srcId)}</span>`;
                }
                html += `
                    <div class="item-card" data-id="${it.id}">
                        <div class="card-top">
                            <span class="item-name">${escapeHtml(it.name)}</span>
                            <span class="item-id">#${it.id}</span>
                        </div>
                        <div class="effect">${statsHtml}</div>
                        <div class="location">
                            <span>👹 <span class="monster-name">${escapeHtml(monsterName)}</span></span>
                            <span>🗺️ <span class="map-name">${escapeHtml(mapName)}</span></span>
                        </div>
                        <div class="card-footer">${upTag}${downTag}</div>
                    </div>
                `;
            }
            itemsGrid.innerHTML = html;
            itemsGrid.querySelectorAll('.item-card').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.rel-tag')) return;
                    const id = parseInt(el.dataset.id);
                    showDetail(id);
                });
            });
            itemsGrid.querySelectorAll('.rel-tag').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(el.dataset.id);
                    if (id) {
                        const item = db.items.find(i => i.id === id);
                        if (item) {
                            searchInput.value = item.name;
                            clearBtn.classList.add('visible');
                            renderAll();
                            showDetail(id);
                        }
                    }
                });
            });
        }

        function updateStats() {
            const items = db?.items || [];
            statTotal.textContent = items.length;
            const relCount = Object.values(db?.upgradeMap || {}).reduce((a, b) => a + b.length, 0);
            statUpgrades.textContent = relCount;
            statMonsters.textContent = Object.keys(db?.monsterCache || {}).length;
            statMaps.textContent = Object.keys(db?.mapCache || {}).length;
        }

        // ---- AUTO IMPORT ----
        async function autoImportIfEmpty() {
            const localData = loadDb();
            if (localData && localData.items && localData.items.length > 0) {
                db = localData;
                buildAutocomplete(db.items);
                renderAll();
                updateStats();
                return;
            }
            console.log('🔄 Database kosong, auto import...');
            showLoading('Mengunduh database awal…', 0);
            try {
                const url = DEFAULT_IMPORT_URL + '?t=' + Date.now();
                const response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                updateLoading('Memproses data…', 50);
                const jsonData = await response.json();
                if (!jsonData || typeof jsonData !== 'object') throw new Error('Data bukan objek JSON valid');
                if (!Array.isArray(jsonData.items) || jsonData.items.length === 0) throw new Error(
                    'Data tidak memiliki array "items" atau kosong');
                const rel = buildRelations(jsonData.items);
                const cleanData = {
                    version: jsonData.version || '7.3',
                    lastUpdated: new Date().toISOString(),
                    items: jsonData.items || [],
                    upgradeMap: rel.upgradeMap,
                    downgradeMap: rel.downgradeMap,
                    monsterCache: jsonData.monsterCache || {},
                    mapCache: jsonData.mapCache || {},
                };
                db = cleanData;
                if (!saveDb(db)) throw new Error('Gagal menyimpan ke localStorage');
                buildAutocomplete(db.items);
                renderAll();
                updateStats();
                hideLoading();
                showToast(`✅ Database otomatis diimpor! ${jsonData.items.length} xtal`, 'success', 4000);
            } catch (error) {
                hideLoading();
                console.error('❌ Gagal auto import:', error);
                db = { items: [], upgradeMap: {}, downgradeMap: {}, monsterCache: {}, mapCache: {} };
                renderEmpty(true);
                updateStats();
                showToast(`❌ Gagal auto import: ${error.message}. Refresh halaman untuk mencoba lagi.`, 'error', 6000);
            }
        }

        // ---- SEARCH ----
        function handleSearch() {
            const q = searchInput.value;
            if (q.length) clearBtn.classList.add('visible');
            else clearBtn.classList.remove('visible');
            renderAutocomplete(q);
            renderAll();
            if (detailPanel.classList.contains('open') && currentDetailId) {
                const item = db.items.find(i => i.id === currentDetailId);
                if (item) showDetail(currentDetailId);
            }
        }

        // ---- INIT ----
        function init() {
            console.log('🚀 Xtall Database v7.3 - Publik');
            const localData = loadDb();
            if (localData && localData.items && localData.items.length > 0) {
                db = localData;
                buildAutocomplete(db.items);
                renderAll();
                updateStats();
                console.log('INIT: Data lokal ditemukan:', db.items.length, 'xtal');
            } else {
                db = { items: [], upgradeMap: {}, downgradeMap: {}, monsterCache: {}, mapCache: {} };
                renderEmpty(true);
                updateStats();
                autoImportIfEmpty();
            }

            searchInput.addEventListener('input', handleSearch);
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.remove('visible');
                autocompleteBox.classList.remove('open');
                renderAll();
                searchInput.focus();
                detailPanel.classList.remove('open');
            });
            closeDetailBtn.addEventListener('click', () => detailPanel.classList.remove('open'));

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-section')) autocompleteBox.classList.remove('open');
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') detailPanel.classList.remove('open');
            });

            console.log('✦ Xtall Database v7.3 siap');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
